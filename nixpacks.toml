[phases.setup]
nixPkgs = [
  "nodejs_20",
  "cairo",
  "pango",
  "libpng",
  "libjpeg",
  "giflib",
  "librsvg",
  "pixman",
  "pkg-config",
  "python3",
  "gnumake",
  "gcc"
]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps",
  "node scripts/patch-fca.js"
]

[start]
cmd = "node index.js"
